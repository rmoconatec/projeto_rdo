services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:22-alpine
    ports:
      - "3000:3000"
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm install && npx drizzle-kit push --force && npm run dev"
    volumes:
      - .:/app

volumes:
  pgdata:
